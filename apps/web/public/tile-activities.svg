<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="0.5" stop-color="#EF4444"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="blur" x="-40" y="-40" width="1280" height="880" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="48" fill="url(#bg)"/>

  <g opacity="0.55" filter="url(#blur)">
    <circle cx="310" cy="220" r="210" fill="#22C55E"/>
    <circle cx="910" cy="260" r="230" fill="#A855F7"/>
    <circle cx="740" cy="640" r="280" fill="#06B6D4"/>
  </g>

  <!-- ball -->
  <circle cx="420" cy="520" r="170" fill="#0B1220" fill-opacity="0.22"/>
  <circle cx="420" cy="520" r="120" fill="#FFFFFF" fill-opacity="0.65"/>
  <path d="M330 520C360 470 420 450 470 470C520 490 540 540 520 590" stroke="#0B1220" stroke-opacity="0.25" stroke-width="18" stroke-linecap="round"/>

  <!-- simple athlete mark -->
  <circle cx="800" cy="380" r="42" fill="#FFFFFF" fill-opacity="0.72"/>
  <path d="M710 610L785 470L900 520L980 650" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M860 460L950 420" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="34" stroke-linecap="round"/>
</svg>
